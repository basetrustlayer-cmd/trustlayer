name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: trustlayer_dev
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trustlayer_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/trustlayer_dev?schema=public
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: trustlayer-ci-secret-32-characters-minimum

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify OpenAPI lock
        run: node scripts/check-openapi-lock.js

      - run: pnpm --filter @trustlayer/database prisma:generate

      - run: pnpm --filter @trustlayer/database prisma:migrate -- --name ci_init

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test
